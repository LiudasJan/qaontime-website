<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank ATM Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="atm">
        <div id="screen" class="screen"></div>
        <input type="text" id="pinInput" placeholder="Enter PIN" maxlength="4">
        <button onclick="enterPin()">Enter</button>
        <button onclick="withdrawMoney()">Withdraw</button>
        <button onclick="checkBalance()">Balance</button>
        <button onclick="insertCard()">Insert Card</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
