<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>Water Flow Simulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="controls">
            <div class="valve" onclick="toggleValve(1)" id="valve1">Valve 1</div>
            <div class="valve" onclick="toggleValve(2)" id="valve2">Valve 2</div>
            <div class="valve" onclick="toggleValve(3)" id="valve3">Valve 3</div>
            <div class="valve" onclick="toggleValve(4)" id="valve4">Valve 4</div>
            <div class="valve" onclick="toggleValve(5)" id="valve5">Valve 5</div>
        </div>
        <div class="pipes">
            <div class="pipe" id="pipe1">pipe 1</div>
            <div class="pipe" id="pipe2">pipe 2</div>
            <div class="pipe" id="pipe3">pipe 3</div>
            <div class="pipe" id="pipe4">pipe 4</div>
            <div class="pipe" id="pipe5">pipe 5</div>
        </div>
        <div class="indicators">
            <div class="indicator" id="indicator1"></div>
            <div class="indicator" id="indicator2"></div>
            <div class="indicator" id="indicator3"></div>
            <div class="indicator" id="indicator4"></div>
            <div class="indicator" id="indicator5"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
