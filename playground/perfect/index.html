<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <title>Find number</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Find number</h1>
    <div>
        <input type="number" id="numberInput" placeholder="Enter a number" min="1">
        <button onclick="checkPerfectNumber()">Check</button>
    </div>
    <div id="result"></div>
    <div id="error" class="hidden">The number entered is invalid.</div>

    <script src="script.js"></script>
</body>
</html>
